SearchDefinitions:
  moduleName: request-service.watertanker_fixedpoint
  summary: Water Tanker Fixed Point Inbox API
  version: 1.0.0

  definitions:
    - name: inboxWTFixedPointSearchdesc
      query:
        baseQuery: |
          SELECT row_to_json(result) FROM (
            SELECT 
                data.booking_no,
                data.createdtime,
                count_table.total_count
            FROM (
                SELECT DISTINCT ON (pi.businessid)
                    pi.businessid AS booking_no,
                    pi.createdtime
                FROM eg_wf_processinstance_v2 pi
                LEFT JOIN upyog_rs_water_tanker_booking_details urstbd
                    ON pi.businessid = urstbd.booking_no
                LEFT JOIN eg_wf_assignee_v2 assg
                    ON pi.id = assg.processinstanceid

                WHERE pi.businessservice = 'watertanker-fixedpoint'

                AND (:tenantId IS NULL OR urstbd.tenant_id = :tenantId)
                AND (NULLIF(TRIM(:mobileNumber),'') IS NULL OR urstbd.mobile_number = TRIM(:mobileNumber))
                AND (NULLIF(TRIM(:bookingNo),'') IS NULL OR urstbd.booking_no = TRIM(:bookingNo))
                AND (NULLIF(TRIM(:fromDate), '') IS NULL OR pi.createdtime >= CAST(TRIM(:fromDate) AS BIGINT))
                AND (NULLIF(TRIM(:toDate), '') IS NULL OR pi.createdtime <= CAST(TRIM(:toDate) AS BIGINT))
                ORDER BY pi.businessid DESC
                LIMIT :limit OFFSET :offset
            ) data

            CROSS JOIN (
                SELECT COUNT(DISTINCT pi.businessid) AS total_count
                FROM eg_wf_processinstance_v2 pi
                LEFT JOIN upyog_rs_water_tanker_booking_details urstbd
                    ON pi.businessid = urstbd.booking_no

                WHERE pi.businessservice = 'watertanker-fixedpoint'

                AND (:tenantId IS NULL OR urstbd.tenant_id = :tenantId)
                AND (NULLIF(TRIM(:mobileNumber),'') IS NULL OR urstbd.mobile_number = TRIM(:mobileNumber))
                AND (NULLIF(TRIM(:bookingNo),'') IS NULL OR urstbd.booking_no = TRIM(:bookingNo))
                AND (NULLIF(TRIM(:fromDate), '') IS NULL OR pi.createdtime >= CAST(TRIM(:fromDate) AS BIGINT))
                AND (NULLIF(TRIM(:toDate), '') IS NULL OR pi.createdtime <= CAST(TRIM(:toDate) AS BIGINT))
            ) count_table
          ) result

      searchParams:
        condition: AND
        params:
          - name: tenantId
            isMandatory: true
            jsonPath: $.searchCriteria.tenantId

          - name: mobileNumber
            isMandatory: false
            jsonPath: $.searchCriteria.mobileNumber

          - name: bookingNo
            isMandatory: false
            jsonPath: $.searchCriteria.bookingNo

          - name: fromDate
            isMandatory: false
            jsonPath: $.searchCriteria.fromDate

          - name: toDate
            isMandatory: false
            jsonPath: $.searchCriteria.toDate

          - name: limit
            isMandatory: false
            jsonPath: $.searchCriteria.noOfRecords

          - name: offset
            isMandatory: false
            jsonPath: $.searchCriteria.offset

      output:
        jsonFormat: {"ResponseInfo": {},"waterTankerBookingDetail": []}
        outJsonPath: $.waterTankerBookingDetail
        responseInfoPath: $.ResponseInfo