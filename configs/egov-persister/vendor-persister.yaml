 - version: 1.0
   description: Save Vendor Driver Mapping
   fromTopic: save-vendordrivermapping-application
   isTransaction: true
   queryMaps:

     - query: >
         INSERT INTO eg_vendor_driver(vendor_id, driver_id, vendordriverstatus)
         VALUES (?, ?, ?)
         ON CONFLICT (driver_id)
         DO UPDATE SET
           vendor_id = EXCLUDED.vendor_id,
           vendordriverstatus = EXCLUDED.vendordriverstatus;
       basePath: vendor.drivers.*
       jsonMaps:
         - jsonPath: $.vendor.id
         - jsonPath: $.vendor.drivers.*.id
         - jsonPath: $.vendor.drivers.*.vendorDriverStatus
  
